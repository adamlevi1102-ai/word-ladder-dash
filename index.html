<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder Dash</title>
<style>
  :root{
    --bg:#0f1020; --panel:#1a1c33; --ink:#eef0ff; --muted:#8b8fb5;
    --accent:#5eead4; --accent2:#a78bfa; --good:#34d399; --bad:#fb7185;
    --slot:#272a47; --slot-line:#3a3e63;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Segoe UI",system-ui,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #20234a 0%, var(--bg) 55%);
    color:var(--ink); min-height:100%;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .app{
    width:100%; max-width:560px; background:rgba(26,28,51,.78);
    border:1px solid #2c2f54; border-radius:20px; padding:26px 26px 30px;
    box-shadow:0 30px 80px rgba(0,0,0,.45); backdrop-filter:blur(6px);
  }
  h1{
    margin:0 0 2px; font-size:26px; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .stats{display:flex; gap:10px; margin-bottom:16px;}
  .stat{
    flex:1; background:var(--panel); border:1px solid #2c2f54;
    border-radius:12px; padding:10px 12px; text-align:center;
  }
  .stat .k{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}
  .stat .v{font-size:20px; font-weight:700; margin-top:2px;}
  .v.warn{color:var(--bad);}
  .ladder{
    display:flex; flex-direction:column; gap:8px; margin:6px 0 14px;
    max-height:42vh; overflow-y:auto; padding-right:4px;
  }
  .row{display:flex; gap:8px; justify-content:center;}
  .tile{
    width:48px; height:48px; border-radius:10px; display:flex;
    align-items:center; justify-content:center; font-size:22px; font-weight:800;
    text-transform:uppercase; background:var(--slot); border:1px solid var(--slot-line);
  }
  .row.target .tile{background:linear-gradient(180deg,#2b3b52,#22304a); border-color:#3d5a78; color:var(--accent);}
  .row.start .tile{background:linear-gradient(180deg,#2f2b52,#272247); border-color:#5a4d8a; color:var(--accent2);}
  .row.step .tile{background:#1f2a24; border-color:#2f5a45; color:var(--good);}
  .row .label{align-self:center; font-size:11px; color:var(--muted); width:46px; text-align:right;}
  .row .changed{outline:2px solid var(--accent); outline-offset:1px;}
  form{display:flex; gap:8px; margin-top:4px;}
  input[type=text]{
    flex:1; font-size:20px; letter-spacing:6px; text-transform:uppercase;
    text-align:center; padding:12px; border-radius:12px; border:1px solid #3a3e63;
    background:#12142a; color:var(--ink); outline:none;
  }
  input:focus{border-color:var(--accent);}
  button{
    cursor:pointer; border:none; border-radius:12px; font-weight:700; font-size:15px;
    padding:0 18px; color:#0f1020; background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:transform .08s ease, filter .15s;
  }
  button:hover{filter:brightness(1.08);} button:active{transform:translateY(1px);}
  button.ghost{background:transparent; color:var(--muted); border:1px solid #3a3e63;}
  .controls{display:flex; gap:8px; margin-top:12px;}
  .controls button{flex:1; padding:11px 0;}
  .msg{min-height:20px; margin-top:10px; font-size:14px; text-align:center; color:var(--muted);}
  .msg.good{color:var(--good);} .msg.bad{color:var(--bad);}
  .win{
    text-align:center; padding:14px; margin-top:12px; border-radius:14px;
    background:linear-gradient(180deg,#172a3a,#13233a); border:1px solid #2f5a78;
  }
  .win h2{margin:0 0 4px; color:var(--accent);}
  .hint{font-size:12px; color:var(--muted); text-align:center; margin-top:14px; line-height:1.5;}
  kbd{background:#23264a; border:1px solid #3a3e63; border-radius:5px; padding:1px 6px; font-size:11px;}
</style>
</head>
<body>
<div class="app">
  <h1>Word Ladder Dash</h1>
  <div class="sub">Change <b>one letter at a time</b> — every rung must be a real word. Reach the target before the clock runs out.</div>

  <div class="stats">
    <div class="stat"><div class="k">Time</div><div class="v" id="time">60</div></div>
    <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
    <div class="stat"><div class="k">Steps</div><div class="v" id="steps">0</div></div>
    <div class="stat"><div class="k">Par</div><div class="v" id="par">–</div></div>
  </div>

  <div class="ladder" id="ladder"></div>

  <form id="form" autocomplete="off">
    <input id="guess" type="text" maxlength="4" placeholder="next word" />
    <button type="submit">Climb</button>
  </form>
  <div class="msg" id="msg">Type a word that differs by exactly one letter.</div>

  <div class="controls">
    <button class="ghost" id="hintBtn" type="button">Hint (−5)</button>
    <button class="ghost" id="undoBtn" type="button">Undo</button>
    <button class="ghost" id="newBtn" type="button">New puzzle</button>
  </div>

  <div class="hint">
    <kbd>Enter</kbd> to climb · <kbd>Esc</kbd> clears the box · Solve under par for a speed bonus.
  </div>
</div>

<script>
/* ---------- Dictionary (common 4-letter words) ---------- */
const WORD_LIST = `able acid aged also area army away baby back bald ball band bank bare

  .split(/\s+/).filter(w => w.length === 4);

const DICT = new Set(WORD_LIST);

/* ---------- Puzzles: each has start, target, and par (shortest path length we expect) ---------- */
const PUZZLES = [
  ["cold","warm",4], ["head","tail",6], ["lead","gold",4], ["fire","heat",5],
  ["wood","tree",6], ["fish","bird",6], ["dark","lamp",6], ["love","hate",5],
  ["poor","rich",6], ["east","west",5], ["milk","wine",6], ["rain","snow",6],
  ["boat","ship",6], ["hard","soft",6], ["moon","star",6], ["king","pawn",7],
  ["sand","rock",6], ["foot","hand",6]
].filter(p => p[0].length === 4 && p[1].length === 4);

/* ---------- BFS to verify a path exists & compute true par ---------- */
function neighbors(word){
  const out = [];
  for(let i=0;i<4;i++){
    for(let c=97;c<=122;c++){
      const ch = String.fromCharCode(c);
      if(ch === word[i]) continue;
      const w = word.slice(0,i)+ch+word.slice(i+1);
      if(DICT.has(w)) out.push(w);
    }
  }
  return out;
}
function shortestLadder(a,b){
  if(!DICT.has(a)||!DICT.has(b)) return null;
  if(a===b) return [a];
  const q=[[a]], seen=new Set([a]);
  while(q.length){
    const path=q.shift(), last=path[path.length-1];
    for(const n of neighbors(last)){
      if(seen.has(n)) continue;
      const np=[...path,n];
      if(n===b) return np;
      seen.add(n); q.push(np);
    }
  }
  return null;
}

/* ---------- Game state ---------- */
let state;
const $ = id => document.getElementById(id);

function pickPuzzle(){
  // pick a puzzle that actually has a valid ladder in our dictionary
  const shuffled = [...PUZZLES].sort(()=>Math.random()-0.5);
  for(const [s,t] of shuffled){
    const path = shortestLadder(s,t);
    if(path) return {start:s, target:t, par:path.length-1, solution:path};
  }
  // fallback
  return {start:"cold", target:"warm", par:4, solution:["cold","cord","word","ward","warm"]};
}

function newGame(){
  const p = pickPuzzle();
  state = {
    start:p.start, target:p.target, par:p.par, solution:p.solution,
    chain:[p.start], time:60, score: state ? state.score : 0,
    timer:null, over:false, hintsUsed:0
  };
  $('par').textContent = p.par;
  $('guess').value = ''; $('guess').disabled = false;
  $('msg').textContent = 'Type a word that differs by exactly one letter.';
  $('msg').className = 'msg';
  render();
  clearInterval(state.timer);
  state.timer = setInterval(tick, 1000);
  $('guess').focus();
}

function tick(){
  state.time--;
  $('time').textContent = state.time;
  $('time').classList.toggle('warn', state.time <= 10);
  if(state.time <= 0) lose();
}

function diffCount(a,b){
  let d=0; for(let i=0;i<4;i++) if(a[i]!==b[i]) d++; return d;
}
function changedIndex(a,b){
  for(let i=0;i<4;i++) if(a[i]!==b[i]) return i; return -1;
}

function render(){
  const L = $('ladder'); L.innerHTML='';
  const rows = [];
  state.chain.forEach((w,i)=>{
    rows.push(makeRow(w, i===0 ? 'start':'step', i===0?'start': '#'+i,
      i>0 ? changedIndex(state.chain[i-1], w) : -1));
  });
  rows.push(makeRow(state.target,'target','target', changedIndex(state.chain[state.chain.length-1], state.target)));
  rows.forEach(r=>L.appendChild(r));
  L.scrollTop = L.scrollHeight;
  $('steps').textContent = state.chain.length-1;
  $('score').textContent = state.score;
}

function makeRow(word,cls,label,hi){
  const row=document.createElement('div'); row.className='row '+cls;
  const lab=document.createElement('div'); lab.className='label'; lab.textContent=label;
  row.appendChild(lab);
  for(let i=0;i<4;i++){
    const t=document.createElement('div'); t.className='tile'; t.textContent=word[i];
    if(i===hi && (cls==='step'||cls==='target')) t.classList.add('changed');
    row.appendChild(t);
  }
  return row;
}

function submitGuess(e){
  if(e) e.preventDefault();
  if(state.over) return;
  let g = $('guess').value.trim().toLowerCase();
  $('guess').value='';
  if(g.length!==4){ flash('Words must be 4 letters.','bad'); return; }
  const last = state.chain[state.chain.length-1];
  if(diffCount(last,g)!==1){ flash('Change exactly one letter from "'+last.toUpperCase()+'".','bad'); return; }
  if(!DICT.has(g)){ flash('"'+g.toUpperCase()+'" isn\'t in the word list.','bad'); return; }
  if(state.chain.includes(g)){ flash('You already used that word.','bad'); return; }

  state.chain.push(g);
  if(g===state.target){ win(); return; }
  flash('Nice — keep climbing!','good');
  render();
}

function flash(text,kind){
  $('msg').textContent = text;
  $('msg').className = 'msg '+(kind||'');
}

function win(){
  state.over = true;
  clearInterval(state.timer);
  const steps = state.chain.length-1;
  const base = 100;
  const timeBonus = state.time * 2;
  const parBonus = steps <= state.par ? 50 : 0;
  const hintPenalty = state.hintsUsed * 5;
  const gained = Math.max(10, base + timeBonus + parBonus - hintPenalty);
  state.score += gained;
  render();
  const L = $('ladder');
  const w = document.createElement('div'); w.className='win';
  w.innerHTML = `<h2>Solved!</h2>
    <div>${steps} steps · ${state.time}s left · ${parBonus?'<b>Par bonus!</b> · ':''}
    <b>+${gained}</b> points</div>`;
  L.parentNode.insertBefore(w, L.nextSibling);
  $('guess').disabled = true;
  flash('Press “New puzzle” for the next ladder.','good');
  setTimeout(()=>{ if(w.parentNode) w.parentNode.removeChild(w); }, 6000);
}

function lose(){
  state.over = true;
  clearInterval(state.timer);
  $('guess').disabled = true;
  flash('Time! The target was "'+state.target.toUpperCase()+'". Try a new puzzle.','bad');
}

function useHint(){
  if(state.over) return;
  const last = state.chain[state.chain.length-1];
  // find the solution from current position to target via BFS, suggest next move
  const path = shortestLadder(last, state.target);
  if(!path || path.length<2){ flash('No hint available from here.','bad'); return; }
  state.hintsUsed++;
  state.score = Math.max(0, state.score - 5);
  const next = path[1];
  const idx = changedIndex(last, next);
  flash(`Hint: change position ${idx+1} → "${next[idx].toUpperCase()}"`, '');
  $('score').textContent = state.score;
  $('guess').value = next; $('guess').focus();
}

function undo(){
  if(state.over || state.chain.length<=1) return;
  state.chain.pop();
  render();
  flash('Stepped back down.','');
}

/* ---------- Wire up ---------- */
$('form').addEventListener('submit', submitGuess);
$('hintBtn').addEventListener('click', useHint);
$('undoBtn').addEventListener('click', undo);
$('newBtn').addEventListener('click', newGame);
$('guess').addEventListener('keydown', e=>{ if(e.key==='Escape') $('guess').value=''; });

newGame();
</script>
</body>
</html>
